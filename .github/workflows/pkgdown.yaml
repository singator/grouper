name: pkgdown

on:
  push:
    branches: [main]

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4 # downloading repo into the runner

      - uses: r-lib/actions/setup-pandoc@v2 # for vignettes

      - uses: r-lib/actions/setup-r@v2 # installing R
        with:
          use-public-rspm: true # using RSPM to speed up package installation

      - uses: r-lib/actions/setup-r-dependencies@v2 # installing dependencies
        with:
          extra-packages: any::pkgdown, local::.
          needs: website # installs packages nedded to build website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
